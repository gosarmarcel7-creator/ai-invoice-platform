services:
  - type: web
    name: docuextract-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MISTRAL_API_KEY
        value: demNtE67EC6JgovKPd8dDmOtpUeAseeY
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: docuextract-db
          property: connectionString

databases:
  - name: docuextract-db
    plan: free
